



<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Chat Interface</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        Chat Interface
    </div>

    <div id="chat" class="chat-messages">
        <div class="message bot">Hello! How can I help you?</div>
        <div class="message user">I want to build a chat interface.</div>
        <div class="message bot">Great! Let's start with HTML and Tailwind.</div>
    </div>

    <div class="chat-input">
        <textarea placeholder="Type a message..."></textarea>
        <button>Send</button>
    </div>

</div>

</body>

</html>
